<!DOCTYPE html>
<html>
<head>
    <title>Student Performance Predictor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }

        .light-mode {
            background: #f4f6f9;
            color: #333;
        }

        .dark-mode {
            background: #121212;
            color: #fff;
        }

        /* Big Heading Outside */
        .main-heading {
            position: absolute;
            top: 30px;
            font-size: 40px;
            font-weight: 700;
            letter-spacing: 1px;
            text-align: center;
        }

        /* Theme Toggle */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 25px;
            text-align: center;
            font-size: 12px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
            margin-top: 5px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #4CAF50;
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }

        .container {
            width: 480px;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.25);
            background: inherit;
            margin-top: 90px;
            /* margin-bottom: 40px; */
        }

        select, input[type="number"] {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border-radius: 6px;
            font-size: 14px;
        }

        .light-mode select, .light-mode input {
            background: white;
            color: black;
            border: 1px solid #ddd;
        }

        .dark-mode select, .dark-mode input {
            background: #1e1e1e;
            color: white;
            border: 1px solid #444;
        }

        button {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 15px;
            background: #4CAF50;
            color: white;
            transition: 0.3s;
        }

        button:hover {
            background: #45a049;
        }

        .result {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            background: rgba(0,0,0,0.1);
            text-align: center;
        }

        .pass {
            color: #00ff88;
            font-weight: bold;
        }

        .fail {
            color: #ff4d4d;
            font-weight: bold;
        }

        .confidence-container {
            margin-top: 10px;
        }

        .progress-bar {
            width: 100%;
            height: 12px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 5px;
        }

        .light-mode .progress-bar {
            background: #ddd;
        }

        .progress-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.8s ease-in-out;
        }

        .pass-bar {
            background: linear-gradient(90deg, #00ff88, #00cc66);
        }

        .fail-bar {
            background: linear-gradient(90deg, #ff4d4d, #cc0000);
        }
    </style>
</head>

<body class="dark-mode">

<div class="main-heading">
    🎓 Student Performance Prediction

</div>

<!-- Theme Toggle -->
<div class="theme-toggle">
    <div id="themeLabel">Dark Theme</div>
    <label class="switch">
        <input type="checkbox" checked onclick="toggleMode()">
        <span class="slider"></span>
    </label>
</div>

<div class="container">

    <form method="POST" action="/predict">

        <select name="age" required>
            <option value="">Select Age</option>
            {% for i in range(15,23) %}
            <option value="{{ i }}">{{ i }}</option>
            {% endfor %}
        </select>

        <select name="traveltime" required>
            <option value="">Travel Time</option>
            <option value="1">Less than 15 min</option>
            <option value="2">15–30 min</option>
            <option value="3">30–60 min</option>
            <option value="4">More than 1 hour</option>
        </select>

        <select name="studytime" required>
            <option value="">Study Time</option>
            <option value="1">Less than 2 hrs</option>
            <option value="2">2–5 hrs</option>
            <option value="3">5–10 hrs</option>
            <option value="4">More than 10 hrs</option>
        </select>

        <select name="failures" required>
            <option value="">Past Failures</option>
            <option value="0">0</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
        </select>

        <select name="freetime" required>
            <option value="">Free Time</option>
            {% for i in range(1,6) %}
            <option value="{{ i }}">{{ i }}</option>
            {% endfor %}
        </select>

        <select name="goout" required>
            <option value="">Going Out Frequency</option>
            {% for i in range(1,6) %}
            <option value="{{ i }}">{{ i }}</option>
            {% endfor %}
        </select>

        <select name="Dalc" required>
            <option value="">Weekday Alcohol</option>
            {% for i in range(1,6) %}
            <option value="{{ i }}">{{ i }}</option>
            {% endfor %}
        </select>

        <select name="Walc" required>
            <option value="">Weekend Alcohol</option>
            {% for i in range(1,6) %}
            <option value="{{ i }}">{{ i }}</option>
            {% endfor %}
        </select>

        <select name="health" required>
            <option value="">Health Status</option>
            {% for i in range(1,6) %}
            <option value="{{ i }}">{{ i }}</option>
            {% endfor %}
        </select>

        <input type="number" name="absences" placeholder="Absences (0–100)" min="0" max="100" required>

        <button type="submit">Predict Performance</button>

    </form>

  {% if prediction %}
<div class="result">
    <p><strong>Predicted Grade:</strong> {{ prediction.marks }}</p>

    <p>
        <strong>Status:</strong>
        <span class="{% if prediction.pass == 'Pass' %}pass{% else %}fail{% endif %}">
            {{ prediction.pass }}
        </span>
    </p>

    <div class="confidence-container">
        <p><strong>Pass Probability:</strong> {{ prediction.confidence }}%</p>

        <div class="progress-bar">
            <div class="progress-fill 
                {% if prediction.pass == 'Pass' %}pass-bar{% else %}fail-bar{% endif %}"
                style="width: {{ prediction.confidence }}%;">
            </div>
        </div>
    </div>
</div>
{% endif %}

</div>

<script>
function toggleMode() {
    document.body.classList.toggle("dark-mode");
    document.body.classList.toggle("light-mode");

    let label = document.getElementById("themeLabel");
    if (document.body.classList.contains("dark-mode")) {
        label.innerText = "Dark Theme";
    } else {
        label.innerText = "Light Theme";
    }
}
</script>

</body>
</html>
